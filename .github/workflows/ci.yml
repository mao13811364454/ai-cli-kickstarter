name: CI

on:
  push:
  pull_request:

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck kickstarter.sh Start-Linux.sh Start-macOS.command tests/run-tests.sh tests/stubs/curl

  test-bash:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/run-tests.sh

  lint-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        # Write-Host and Invoke-Expression are intrinsic to an interactive
        # console installer, so those two rules are excluded.
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path kickstarter.ps1 -Severity Warning -ExcludeRule PSAvoidUsingWriteHost, PSAvoidUsingInvokeExpression -EnableExit
